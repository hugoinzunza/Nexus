<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f1117">
  <title>Nexux · Trading</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Nexux">
  <link rel="stylesheet" href="styles.css">
  <script src="/static/pwa.js" defer></script>
  <!-- TradingView Lightweight Charts (Apache-2.0), bundleada localmente. -->
  <script src="/static/vendor/lightweight-charts.standalone.production.js"></script>
</head>
<body>
  <header class="topbar">
    <a class="back" href="/">◆ Nexux</a>
    <h1>Co-piloto de Trading</h1>
    <a class="back bt-link" href="/m/trading/backtest">Backtest SMC →</a>
    <button class="alert-btn" id="alert-btn" type="button">🔔 Alertas SMC</button>
    <div class="status" id="status">
      <span class="dot" id="status-dot"></span>
      <span id="status-text">conectando…</span>
    </div>
  </header>

  <main id="instruments" class="instruments">
    <!-- Las tarjetas de cada instrumento se generan dinámicamente -->
  </main>

  <footer class="foot">
    <span class="foot-note">Solo lectura · no ejecuta órdenes · capas SMC = contexto</span>
    <span id="last-update">—</span>
  </footer>

  <!-- Plantilla de tarjeta de instrumento (se clona por cada par) -->
  <template id="card-tpl">
    <section class="instrument-card">
      <div class="ic-header">
        <div class="ic-title">
          <h2 class="ic-symbol"></h2>
          <span class="ic-change"></span>
        </div>
        <div class="ic-price"></div>
      </div>

      <div class="ic-stats">
        <div class="stat"><span class="k">Máx 24h</span><span class="v ic-high"></span></div>
        <div class="stat"><span class="k">Mín 24h</span><span class="v ic-low"></span></div>
        <div class="stat"><span class="k">Vol 24h</span><span class="v ic-vol"></span></div>
      </div>

      <div class="ic-body">
        <div class="chart-wrap">
          <div class="chart-controls">
            <div class="tf-selector" role="group" aria-label="Temporalidad del gráfico"></div>
            <div class="ind-toggles" role="group" aria-label="Indicadores"></div>
            <div class="lux-toggles" role="group" aria-label="Capas SMC+"></div>
            <button class="chart-expand" type="button" aria-label="Expandir gráfico" title="Expandir">⤢</button>
          </div>
          <div class="chart"></div>
          <div class="candle-timer" title="Cierre de la vela actual"><span class="ct-ic">⧗</span><span class="ct-val">—</span></div>
        </div>
      </div>

      <!-- Análisis SMC en vivo (reemplaza al libro: más útil para planear) -->
      <div class="signals smc-stats">
        <div class="sig"><span class="k">Régimen (VIX + ADX)</span><span class="v smc-regime">—</span></div>
        <div class="sig"><span class="k">Sesgo (premium/descuento)</span><span class="v smc-bias">—</span></div>
        <div class="sig"><span class="k">Estructura (dealing range)</span><span class="v smc-struct">—</span></div>
        <div class="sig"><span class="k">Sesión activa</span><span class="v smc-session">—</span></div>
        <div class="sig"><span class="k">POI más cercano</span><span class="v smc-poi-near">—</span></div>
        <div class="sig"><span class="k">Setup vigente</span><span class="v smc-setup">—</span></div>
      </div>

      <div class="smc-panel">
        <div class="smc-head">
          <span class="smc-title">POIs activos · SMC multi-TF</span>
          <span class="smc-legend">
            <i class="lg discount"></i> descuento
            <i class="lg premium"></i> premium
          </span>
        </div>
        <div class="smc-list">Analizando…</div>
      </div>
    </section>
  </template>

  <script src="app.js"></script>
</body>
</html>
